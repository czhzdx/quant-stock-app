name: Stock Analysis

on:
  # 定时触发：工作日早9点（UTC+8）
  schedule:
    - cron: '0 1 * * 1-5'  # UTC 1:00 = 北京时间 9:00

  # 手动触发
  workflow_dispatch:
    inputs:
      stocks:
        description: '股票代码（逗号分隔，如：600519,000858,000333）'
        required: false
        default: ''
      notify:
        description: '是否发送通知'
        required: false
        type: boolean
        default: true
      channels:
        description: '通知渠道（逗号分隔，如：email,wechat）'
        required: false
        default: 'email,wechat'

  # 推送触发（用于测试）
  push:
    branches:
      - main
    paths:
      - 'src/analysis/**'
      - '.github/workflows/stock_analysis.yml'

env:
  PYTHON_VERSION: '3.10'

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p output/reports

      - name: Run stock analysis
        env:
          # 股票列表（优先使用workflow_dispatch输入）
          STOCK_LIST: ${{ github.event.inputs.stocks || '' }}
          # LLM API密钥
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 搜索API密钥
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          BOCHA_API_KEY: ${{ secrets.BOCHA_API_KEY }}
          # 通知配置
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          # 构建命令
          CMD="python main.py analyze --output output/reports"

          # 添加通知参数
          if [ "${{ github.event.inputs.notify }}" = "true" ]; then
            CMD="$CMD --notify"
          fi

          # 添加通知渠道
          if [ -n "${{ github.event.inputs.channels }}" ]; then
            CHANNELS="${{ github.event.inputs.channels }}"
            CMD="$CMD --channels ${CHANNELS//,/ }"
          fi

          # 详细输出
          CMD="$CMD --verbose"

          echo "Running: $CMD"
          eval $CMD

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports
          path: output/reports/
          retention-days: 30

      - name: Commit reports
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 添加报告文件
          git add output/reports/ || true

          # 提交
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Add analysis reports - $(date '+%Y-%m-%d %H:%M')"

          # 推送
          git push origin main || true

  # 可选：运行回测
  backtest:
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        env:
          STOCK_LIST: ${{ github.event.inputs.stocks || '' }}
        run: |
          python main.py backtest \
            --symbols 600519 000858 \
            --start-date 2023-01-01 \
            --end-date 2024-01-01 \
            --output-dir output/backtest \
            --plot \
            --verbose

      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: output/backtest/
          retention-days: 30
